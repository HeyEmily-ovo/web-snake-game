<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇小游戏</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-page">
      <section class="game-panel">
        <header class="game-header">
          <div>
            <h1>贪吃蛇小游戏</h1>
            <p class="subtitle">用方向键或 WASD 控制小蛇吃到更多食物。</p>
          </div>
          <button id="start-button" type="button">开始游戏</button>
        </header>

        <section class="game-info" aria-label="游戏状态">
          <div class="info-card">
            <span class="info-label">当前分数</span>
            <strong id="score">0</strong>
          </div>
          <div class="info-card">
            <span class="info-label">个人最高分</span>
            <strong id="best-score">0</strong>
          </div>
          <div class="info-card">
            <span class="info-label">游戏状态</span>
            <strong id="status">待开始</strong>
          </div>
        </section>

        <section class="game-board-wrapper">
          <canvas
            id="game-canvas"
            width="400"
            height="400"
            aria-label="贪吃蛇游戏画布"
          ></canvas>
        </section>

        <section class="touch-controls" aria-label="移动端方向控制">
          <button class="touch-button touch-up" type="button" data-direction="up">
            ↑
          </button>
          <button class="touch-button touch-left" type="button" data-direction="left">
            ←
          </button>
          <button class="touch-button touch-down" type="button" data-direction="down">
            ↓
          </button>
          <button class="touch-button touch-right" type="button" data-direction="right">
            →
          </button>
        </section>

        <footer class="game-footer">
          <p>电脑操作：方向键 / W A S D</p>
          <p>手机操作：点击下方方向按钮控制移动。</p>
          <p>规则：撞到自己就会结束。</p>
        </footer>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
